plugins:
  - git-revision-date-localized
  - glightbox:
      auto_caption: true
      auto_themed: true
      background: none
      loop: true
      manual: true
      shadow: none
  - macros
  - redirects:
      redirect_maps:
        'library/nestopia_ue.md': 'library/nestopia.md'
        'library/pcsx2.md': 'library/lrps2.md'
  - search:
      lang: en
  - table-reader:
      allow_missing_files: true
      data_path: docs/tables
      select_readers:
        - read_csv
        - read_yaml
  - typeset

theme:
  custom_dir: docs/overrides
  favicon: 'image/branding/invader.png'
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.indexes
    - navigation.prune
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  font:
    text: 'Noto Sans'
    code: 'Noto Sans Mono'
  icon:
    admonition:
      abstract: fontawesome/solid/scroll
      bug: fontawesome/solid/bugs
      danger: fontawesome/solid/cloud-bolt
      example: fontawesome/solid/person-chalkboard
      failure: material/skull-crossbones
      info: fontawesome/solid/info
      note: material/clipboard-text
      question: fontawesome/solid/question
      quote: fontawesome/solid/quote-right-alt
      success: fontawesome/solid/trophy
      tip: material/lightbulb-on
      warning: material/sign-caution
  # Don't include MkDocs' JavaScript
  include_search_page: false
  language: en
  logo: image/branding/invader.png
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: retroarch
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      accent: deep purple
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  search_index_only: true
  static_templates:
    - 404.html
...
