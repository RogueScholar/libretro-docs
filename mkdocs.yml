---
site_name: Libretro Docs
site_url: 'https://docs.libretro.com/'
site_description: >-2
  This is the official RetroArch documentation for users and developers.
  Information from sources outside of this website may be dated or incorrect.
repo_name: 'libretro/docs'
repo_url: 'https://github.com/libretro/docs'
copyright: >-2
  Copyright &copy; 2010&ndash;2026 The Libretro Team. &horbar;
  <a href="#__consent">Change cookie settings</a>
edit_uri: edit/master/docs
use_directory_urls: true

extra:
  adsense: ca-pub-9447404270680650
  analytics:
    property: G-MT11L3F6EZ
    provider: google
  consent:
    description: >-2
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    title: Cookie consent
  font:
    code: 'Noto Sans Mono'
    text: 'Noto Sans'
  i18n:
    next: 'Next'
    prev: 'Previous'
  social:
    - icon: fontawesome/brands/github-alt
      link: 'https://github.com/libretro'
      name: Libretro on GitHub
    - icon: fontawesome/brands/x-twitter
      link: 'https://x.com/libretro'
      name: Libretro on X
    - icon: simple/discord
      link: 'https://discord.gg/C4amCeV'
      name: RetroArch Discord server
    - icon: fontawesome/brands/youtube
      link: 'https://www.youtube.com/@Libretro'
      name: Libretro YouTube channel
    - icon: fontawesome/brands/square-facebook
      link: 'https://facebook.com/libretro'
      name: Libretro on Facebook
    - icon: simple/instagram
      link: 'https://www.instagram.com/libretro'
      name: Libretro/RetroArch on Instagram
    - icon: material/gmail
      link: 'mailto:libretro@gmail.com'
      name: Email the Libretro Team
  status:
    fixed: The information on this page never changes
    incomplete: The information on this page is incomplete
    stable: The information on this page changes infrequently, or not at all
  unit:
    stable: 1.22.2
  version: 0.3.0

extra_css:
  - stylesheets/extra.css
  - stylesheets/tablesort.css

extra_javascript:
  - https://unpkg.com/tablesort@5.7.1/dist/tablesort.min.js
  - js/tablesort.js

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.blocks.caption
  - pymdownx.caret:
      insert: true
      smart_insert: true
      superscript: true
  - pymdownx.critic:
      mode: accept
  - pymdownx.details
  - pymdownx.emoji:
      alt: short
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      options:
        custom_icons:
          - docs/overrides/icons
      strict: false
      title: short
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: false
      guess_lang: block
      line_spans: __span
      linenums: None
      linenums_style: pymdownx-inline
      pygments_lang_class: true
      stripnl: false
      use_pygments: true
  - pymdownx.inlinehilite:
      style_plain_text: true
  - pymdownx.keys:
      camel_case: true
      key_map:
        amp: '&'
        at: '@'
        caret: '^'
        close-paren: ')'
        dollar: '$'
        euro: '€'
        mode: 'Mode'
        octothorpe: '#'
        open-paren: '('
        star: '*'
        sys-req: 'SysReq'
        unknown: 'Unknown'
        unmapped: 'Unmapped'
      separator: '+'
      strict: true
  - pymdownx.magiclink:
      hide_protocol: true
      normalize_issue_symbols: false
      provider: github
      repo: docs
      repo_url_shortener: true
      repo_url_shorthand: true
      social_url_shortener: true
      social_url_shorthand: true
      user: libretro
  - pymdownx.mark:
      smart_mark: true
  - pymdownx.saneheaders
  - pymdownx.smartsymbols:
      arrows: false
  - pymdownx.snippets:
      base_path:
        - '.'
        - 'docs'
      check_paths: true
      dedent_subsections: false
      url_download: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      clickable_checkbox: false
      custom_checkbox: true
  - pymdownx.tilde:
      delete: true
      smart_delete: true
      subscript: true
  - toc:
      permalink: true
      permalink_title: Reference link to this section
      toc_depth: 6

