-
  'Core option': '**Tape Fast Load** { .middle }'
  'Description': 'Instantly load content (enabled), or horizontal scan lines while loading content (disabled)'
  'Valid values': '<ul class="core_opts"><li class="default">On</li><li>Off</li></ul>'
-
  'Core option': '**8K-16K Contents** { .middle }'
  'Description': 'Selects the contents of memory addresses from 8192–16383 from among: content-based heuristic selection, a shadow copy of the ROM, 8K of RAM, or [dK&apos;tronics 4K ROM + 4K of RAM](http://www.fruitcake.plus.com/Sinclair/ZX81/Chroma/ChromaInterface_Software_CharacterSetROM.htm "ZX81 Chroma 81 SCART Interface - Character Set ROM Cartridge") { .middle }'
  'Valid values': '<ul class="core_opts"><li class="default">auto</li><li>ROM shadow</li><li>RAM</li><li>dK&apos;tronics 4K Graphics ROM + 4K RAM</li></ul>'
-
  'Core option': '**High Resolution** { .middle }'
  'Description': 'Enable WRX high resolution display output { .middle }'
  'Valid values': '<ul class="core_opts"><li class="default">auto</li><li>none</li><li>WRX</li></ul>'
-
  'Core option': '**Emulate Chroma 81** { .middle }'
  'Description': 'Enable [Chroma 81](http://www.fruitcake.plus.com/Sinclair/ZX81/Chroma/ChromaInterface.htm "ZX81 Chroma 81 SCART Interface - Introduction") (colorization) interface { .middle }'
  'Valid values': '<ul class="core_opts"><li class="default">auto</li><li>Off</li><li>On</li></ul>'
-
  'Core option': '**Video Presets** { .middle }'
  'Description': 'Change video emulation mode (if Chroma 81 is enabled&comma; "`clean`" mode is used regardless of this option) { .middle }'
  'Valid values': '<ul class="core_opts"><li class="default">clean</li><li>tv</li><li>noisy</li></ul>'
-
  'Core option': '**Sound Emulation** { .middle }'
  'Description': 'Enable sound emulation { .middle }'
  'Valid values': '<ul class="core_opts"><li class="default">auto</li>none</li><li>Zon X-81</li></ul>'
-
  'Core option': '**Transparent Keyboard Overlay** { .middle }'
  'Description': 'Show keyboard overlay as transparent or opaque { .middle }'
  'Valid values': '<ul class="core_opts"><li>Off</li><li class="default">On</li></ul>'
-
  'Core option': '**Time to Release Key (in milliseconds)** { .middle }'
  'Description': 'Duration of time interval between keyboard overlay inputs and key release signal { .middle }'
  'Valid values': '<ul class="core_opts"><li class="default">100</li><li>300</li><li>500</li><li>1000</li></ul>'
